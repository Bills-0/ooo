<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그림판</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    font-family:sans-serif;
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    padding:10px;
    background:#f0f0f0;
    border-bottom:2px solid #ccc;
}

button{
    padding:8px 12px;
    cursor:pointer;
}

canvas{
    flex:1;
    background:white;
    cursor:crosshair;
}
</style>
</head>
<body>

<div class="toolbar">

    <input type="color" id="colorPicker" value="#000000">

    <label>
        브러시
        <input type="range" id="brushSize" min="1" max="100" value="5">
    </label>

    <span id="sizeText">5px</span>

    <button id="penBtn">✏️ 펜</button>
    <button id="eraserBtn">🩹 지우개</button>
    <button id="undoBtn">↩️ 실행 취소</button>
    <button id="clearBtn">🧽 전체 지우기</button>

</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const colorPicker = document.getElementById("colorPicker");
const brushSize = document.getElementById("brushSize");
const sizeText = document.getElementById("sizeText");

const penBtn = document.getElementById("penBtn");
const eraserBtn = document.getElementById("eraserBtn");
const undoBtn = document.getElementById("undoBtn");
const clearBtn = document.getElementById("clearBtn");

let drawing = false;
let erasing = false;

const history = [];

function resizeCanvas() {
    const temp = document.createElement("canvas");
    temp.width = canvas.width;
    temp.height = canvas.height;

    temp.getContext("2d").drawImage(canvas, 0, 0);

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - document.querySelector(".toolbar").offsetHeight;

    ctx.drawImage(temp, 0, 0);
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function saveState() {
    history.push(canvas.toDataURL());

    if(history.length > 30){
        history.shift();
    }
}

brushSize.addEventListener("input", () => {
    sizeText.textContent = brushSize.value + "px";
});

penBtn.addEventListener("click", () => {
    erasing = false;
});

eraserBtn.addEventListener("click", () => {
    erasing = true;
});

clearBtn.addEventListener("click", () => {
    saveState();
    ctx.clearRect(0,0,canvas.width,canvas.height);
});

undoBtn.addEventListener("click", () => {
    if(history.length === 0) return;

    const img = new Image();
    img.src = history.pop();

    img.onload = () => {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img,0,0);
    };
});

canvas.addEventListener("mousedown", (e) => {
    saveState();

    drawing = true;

    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
});

canvas.addEventListener("mousemove", (e) => {
    if(!drawing) return;

    ctx.lineWidth = brushSize.value;
    ctx.lineCap = "round";

    if(erasing){
        ctx.strokeStyle = "#FFFFFF";
    } else {
        ctx.strokeStyle = colorPicker.value;
    }

    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
});

canvas.addEventListener("mouseup", () => {
    drawing = false;
    ctx.beginPath();
});

canvas.addEventListener("mouseleave", () => {
    drawing = false;
    ctx.beginPath();
});
</script>

</body>
</html>
